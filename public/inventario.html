<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inventario de equipos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    .main-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.08);
    }

    h1 {
      font-weight: 600;
      margin-bottom: 25px;
      text-align: center;
    }

    .table-container {
    overflow-x: auto;
    max-height: 75vh;
    }

    @media (min-width: 1200px) {
    .table-container {
        overflow-x: visible;   /* en PC evita scroll horizontal */
    }

    table {
        table-layout: auto;
    }

    @media (max-width: 1199px) {
    th, td {
        white-space: nowrap;
    }
    }
    }

    th {
      background: #0d6efd;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1;
      font-size: 13px;
    }

    td {
      font-size: 13px;
      vertical-align: middle;
    }

    tbody tr:hover {
      background-color: #eef5ff;
    }

    .needs-maintenance {
      background-color: #fff3cd !important;
    }

    .filters {
      margin-bottom: 20px;
    }

    .btn-sm {
      padding: 3px 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>
<div class="container-fluid px-4 mt-4">

    <div class="main-box">
  <h1>Inventario de equipos</h1>

  <!-- FILTROS -->
  <div class="row filters">
    <div class="col-md-4 mb-2">
      <input type="text" id="searchInput" class="form-control"
             placeholder="Buscar por código o nombre...">
    </div>

    <div class="col-md-4 mb-2">
      <select id="filterOffice" class="form-select">
        <option value="">Todas las oficinas</option>
      </select>
    </div>

    <div class="col-md-4 mb-2">
      <select id="filterMaintenance" class="form-select">
        <option value="">Estado mantenimiento</option>
        <option value="Sí">Necesita mantenimiento</option>
        <option value="No">No necesita mantenimiento</option>
      </select>
    </div>
  </div>

  <!-- TABLA -->
  <div class="table-container">
    <table id="equiposTable" class="table table-bordered table-hover text-center align-middle">
      <thead>
      <tr>
        <th>Torre</th>
        <th>Pantalla</th>
        <th>Teclado</th>
        <th>Mouse</th>
        <th>Oficina</th>
        <th>Mant. previo</th>
        <th>Fecha mant.</th>
        <th>Detalle previo</th>
        <th>¿Necesita mant.?</th>
        <th>Detalle actual</th>
        <th>PC</th>
        <th>CPU</th>
        <th>RAM</th>
        <th>Disco</th>
        <th>SO</th>
        <th>IP</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <button id="logoutBtn" class="btn btn-danger w-100 mt-3">Cerrar sesión</button>

</div>

<div class="row mb-4 text-center" id="dashboard">
  <div class="col-md-3 mb-2">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5>Total Equipos</h5>
        <h3 id="totalEquipos">0</h3>
      </div>
    </div>
  </div>

  <div class="col-md-3 mb-2">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5>Necesitan Mantenimiento</h5>
        <h3 id="equiposMantenimiento">0</h3>
      </div>
    </div>
  </div>

  <div class="col-md-3 mb-2">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5>No Necesitan</h5>
        <h3 id="equiposOk">0</h3>
      </div>
    </div>
  </div>

  <div class="col-md-3 mb-2">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5>Oficinas</h5>
        <h3 id="totalOficinas">0</h3>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
